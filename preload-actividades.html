function log(msg, tipo) {
  var d = document.getElementById('log');
  d.style.display = 'block';
  var el = document.createElement('div');
  el.className = 'log-' + (tipo || 'info');
  el.textContent = new Date().toLocaleTimeString('es-MX') + ' — ' + msg;
  d.appendChild(el);
  d.scrollTop = d.scrollHeight;
}

function buildSasUrl(account, table) {
  return 'https://' + account + '.table.core.windows.net/' + table;
}
function normalizeSas(sas) {
  var s = sas.trim();
  return s.startsWith('?') ? s : '?' + s;
}

function sleep(ms){ return new Promise(function(r){ setTimeout(r,ms); }); }

async function upsertEntity(baseUrl, sasStr, entity) {
  var rowKey = encodeURIComponent(entity.RowKey);
  var pk = encodeURIComponent(entity.PartitionKey);
  var upsertUrl = baseUrl + "(PartitionKey='" + pk + "',RowKey='" + rowKey + "')" + sasStr;
  var resp = await fetch(upsertUrl, {
    method: 'PUT',
    headers: {
      'Content-Type': 'application/json',
      'Accept': 'application/json',
      'x-ms-version': '2020-08-04'
    },
    body: JSON.stringify(entity)
  });
  if (!resp.ok) {
    var txt = await resp.text();
    throw new Error(resp.status + ': ' + txt);
  }
}

document.getElementById('btnCargar').addEventListener('click', async function() {
  var account = document.getElementById('account').value.trim();
  var sas = document.getElementById('sas').value.trim();
  var obra = document.getElementById('obra').value.trim();

  if (!sas) { alert('Pega el SAS token completo.'); return; }

  this.disabled = true;
  document.getElementById('estado').textContent = 'Cargando...';
  document.getElementById('progressBox').style.display = 'block';

  var baseUrl = buildSasUrl(account, 'actividades');
  var sasStr = normalizeSas(sas);
  var total = CONCEPTOS.length;
  var ok = 0, err = 0;

  log('Iniciando carga de ' + total + ' conceptos — Obra: ' + obra, 'info');

  for (var i = 0; i < CONCEPTOS.length; i++) {
    var c = CONCEPTOS[i];
    var rowKey = c.clave.replace(/\./g, '-');
    var entity = {
      PartitionKey: obra,
      RowKey: rowKey,
      clave: c.clave,
      descripcion: c.descripcion,
      unidad: c.unidad,
      cantidadContrato: c.cantidad,
      precioUnitario: c.pu,
      importeContrato: c.importe,
      subfases: c.subfases,
      tipoTrabajo: 'estructura',
      activo: true,
      avanceReal: 0,
      avanceProg: 0
    };

    try {
      await upsertEntity(baseUrl, sasStr, entity);
      ok++;
      log('[' + (i+1) + '/' + total + '] OK — ' + c.clave, 'ok');
    } catch(e) {
      err++;
      log('[' + (i+1) + '/' + total + '] ERROR — ' + c.clave + ': ' + e.message, 'err');
    }

    var pct = Math.round((i+1)/total*100);
    document.getElementById('progressFill').style.width = pct + '%';
    document.getElementById('estado').textContent = pct + '% (' + ok + ' ok, ' + err + ' errores)';

    await sleep(80);
  }

  log('Finalizado. ' + ok + ' cargados, ' + err + ' errores.', ok === total ? 'ok' : 'err');
  document.getElementById('estado').textContent = 'Listo: ' + ok + '/' + total;
  document.getElementById('btnCargar').disabled = false;
});
</script>
