<!DOCTYPE html>
<html lang="es">

<link rel="manifest" href="/cao-metarco/manifest.json">
<meta name="theme-color" content="#0b1e3d">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Metarco · CAO — Acceso</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2/lib/msal-browser.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: radial-gradient(ellipse at 70% 50%, #4a90c4 0%, #2563a8 30%, #1a3d7c 60%, #0f2654 100%);
    display: flex; align-items: center; justify-content: center;
    font-family: "Inter", -apple-system, sans-serif;
    padding: 1rem;
  }
  body::before {
    content: "";
    position: fixed; inset: 0;
    background-image:
      radial-gradient(circle at 20% 80%, rgba(255,255,255,0.04) 0%, transparent 50%),
      radial-gradient(circle at 80% 20%, rgba(255,255,255,0.06) 0%, transparent 50%);
    pointer-events: none;
  }

  .container {
    display: flex; flex-direction: column;
    align-items: center;
    width: 100%; max-width: 440px;
  }

  /* Marco circular — fondo azul marino para que el logo blanco contraste */
  .logo-wrap {
    width: 92px; height: 92px; border-radius: 50%;
    background: #1a3d7c;
    border: 3px solid rgba(255,255,255,0.3);
    display: flex; align-items: center; justify-content: center;
    overflow: hidden;
    margin-bottom: -46px;
    z-index: 2;
    position: relative;
  }
  /* El logo es el círculo blanco con transparencia: lo mostramos al 90% del marco
     para que el borde azul del marco sea visible alrededor */
  .logo-wrap img {
    width: 92%;
    height: 92%;
    object-fit: contain;
  }

  .card {
    background: rgba(255,255,255,0.97);
    border-radius: 18px;
    padding: 64px 2.5rem 2.25rem;
    width: 100%;
    box-shadow: 0 24px 64px rgba(0,0,0,0.28);
  }

  .card-head { text-align: center; margin-bottom: 1.5rem; }

  .brand-name {
    font-family: "Orbitron", sans-serif;
    font-weight: 900; font-size: 26px;
    color: #0f2654; letter-spacing: 4px;
    text-transform: uppercase; margin-bottom: 6px; line-height: 1.1;
  }
  .brand-sub {
    font-family: "Orbitron", sans-serif;
    font-weight: 700; font-size: 8.5px;
    color: #7a90b8; letter-spacing: 3.5px;
    text-transform: uppercase; line-height: 1.4;
  }

  .card-title {
    font-size: 18px; font-weight: 600; color: #1a2f5c;
    text-align: center; margin-bottom: 6px;
  }
  .card-desc {
    font-size: 13px; color: #7a90b8; line-height: 1.6;
    text-align: center; margin-bottom: 1.5rem;
  }

  .field-label {
    font-size: 10px; font-weight: 700; color: #8898b8;
    letter-spacing: 1.5px; text-transform: uppercase;
    margin-bottom: 8px; display: block;
  }

  .sel-wrap { position: relative; margin-bottom: 1rem; }
  .sel-wrap::after {
    content: "\203A";
    position: absolute; right: 14px; top: 50%;
    transform: translateY(-50%) rotate(90deg);
    font-size: 20px; color: #8898b8; pointer-events: none;
  }
  .sel-wrap select {
    width: 100%; padding: 13px 40px 13px 14px;
    border: 1.5px solid #d8e2f0; border-radius: 10px;
    font-size: 14px; color: #1a2f5c; background: #f4f7fc;
    -webkit-appearance: none; appearance: none;
    outline: none; cursor: pointer; font-family: "Inter", sans-serif;
    transition: border-color 0.2s;
  }
  .sel-wrap select:focus { border-color: #2563a8; background: #fff; }

  .btn-ms {
    width: 100%; padding: 14px;
    background: #1a2f5c; color: #fff;
    border: none; border-radius: 10px;
    font-size: 15px; font-weight: 600;
    font-family: "Inter", sans-serif; cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 10px;
    margin-bottom: 1rem; transition: background 0.2s;
  }
  .btn-ms:hover { background: #0f2654; }
  .ms-logo { width: 20px; height: 20px; flex-shrink: 0; }

  .sep {
    display: flex; align-items: center; gap: 12px;
    margin-bottom: 1rem; color: #b0bdd4; font-size: 12px;
  }
  .sep::before, .sep::after { content: ""; flex: 1; height: 1px; background: #e0e8f4; }

  .btn-demo {
    width: 100%; padding: 13px;
    background: transparent; color: #4a6080;
    border: 1.5px solid #d8e2f0; border-radius: 10px;
    font-size: 14px; font-family: "Inter", sans-serif; cursor: pointer;
    margin-bottom: 1.5rem; transition: border-color 0.2s, color 0.2s;
  }
  .btn-demo:hover { border-color: #2563a8; color: #1a2f5c; }

  .users-row { display: flex; align-items: center; justify-content: center; gap: 6px; }
  .avatar {
    width: 34px; height: 34px; border-radius: 50%;
    background: #dce6f5; color: #1a3d7c;
    font-size: 11px; font-weight: 700; font-family: "Inter", sans-serif;
    display: flex; align-items: center; justify-content: center;
    border: 2px solid #fff;
  }
  .users-label { font-size: 12px; color: #8898b8; margin-left: 4px; }

  .footer {
    margin-top: 1.25rem; font-size: 11px; color: rgba(255,255,255,0.5);
    display: flex; align-items: center; justify-content: center; gap: 6px;
  }
  .dot-green { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; flex-shrink: 0; }

  .alerta {
    display: none; background: #fef2f2; border: 1px solid #fca5a5;
    border-radius: 8px; padding: 10px 14px;
    font-size: 13px; color: #b91c1c;
    margin-bottom: 1rem; text-align: center;
  }
  .alerta.show { display: block; }
</style>
</head>
<body>
<div class="container">

  <div class="logo-wrap">
<img src="LOGO_METARCO1.png" alt="Metarco">
  </div>

  <div class="card">
    <div class="card-head">
      <div class="brand-name">METARCO</div>
      <div class="brand-sub">Sistema de Control de Obra</div>
    </div>

    <p class="card-title">Inicia sesión</p>
    <p class="card-desc">
      Accede con tu cuenta corporativa para registrar el avance<br>diario de tu obra.
    </p>

    <label class="field-label">Obra activa</label>
    <div class="sel-wrap">
<select id="obraSelect">
        <option value="">— Selecciona una obra —</option>
      </select>
    </div>

    <div class="alerta" id="alerta"></div>

    <button class="btn-ms" onclick="loginMS()">
      <svg class="ms-logo" viewBox="0 0 21 21" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="1" width="9" height="9" fill="#f25022"/>
        <rect x="11" y="1" width="9" height="9" fill="#7fba00"/>
        <rect x="1" y="11" width="9" height="9" fill="#00a4ef"/>
        <rect x="11" y="11" width="9" height="9" fill="#ffb900"/>
      </svg>
      Acceder con Microsoft
    </button>

    <div class="sep">o</div>

    <button class="btn-demo" id="btnDemo" style="display:none" onclick="loginDemo()">Continuar en modo demo</button>

    <div class="users-row">
      <div class="avatar" title="a.medina@metarco.com.mx">AM</div>
      <div class="avatar" title="juancarlos.lopez@metarco.com.mx">JL</div>
      <div class="avatar" title="m.simon@metarco.com.mx">MS</div>
      <div class="avatar" title="a.valiente@metarco.com.mx">AV</div>
      <span class="users-label">4 usuarios activos</span>
    </div>
  </div>

  <div class="footer">
    <div class="dot-green"></div>
    Conexión segura · Azure AD · GitHub Pages
  </div>
</div>

<script>

 const AZURE_ACCOUNT = 'metarcostorage';
const AZURE_TABLE   = 'usuarios';
const AZURE_TABLE_OBRAS = 'obras';
const AZURE_SAS     = '?sv=2026-02-06&ss=bfqt&srt=o&sp=rwdlacupiytfx&se=2028-01-01T09:03:16Z&st=2026-06-02T00:48:16Z&spr=https&sig=jopE8S7LFpN79M86LWlZ5B%2Bws5%2BYbZvECNdVUAtHiGI%3D';

 
async function cargarObras() {
  const url = `https://${AZURE_ACCOUNT}.table.core.windows.net/${AZURE_TABLE_OBRAS}${AZURE_SAS}`;
  try {
    const res = await fetch(url, {
      headers: {
        'Accept': 'application/json;odata=nometadata',
        'x-ms-version': '2020-12-06'
      }
    });
    if (!res.ok) return;
    const data = await res.json();
    const select = document.getElementById('obraSelect');
    select.innerHTML = '<option value="">— Selecciona una obra —</option>';
    data.value
      .filter(o => o.activo)
      .forEach(o => {
        const opt = document.createElement('option');
        opt.value = o.nombre;
        opt.textContent = o.nombre;
        select.appendChild(opt);
      });
  } catch(e) {
    console.error('Error cargando obras:', e);
  }
}
async function consultarUsuario(email) {
  const rowKey = email.replace('@', '_AT_').replace(/\./g, '_');
  const url = `https://${AZURE_ACCOUNT}.table.core.windows.net/${AZURE_TABLE}(PartitionKey='usuarios',RowKey='${rowKey}')${AZURE_SAS}`;
  try {
    const res = await fetch(url, {
      headers: {
        'Accept': 'application/json;odata=nometadata',
        'x-ms-version': '2020-12-06'
      }
    });
    if (res.status === 404) return null;
    if (!res.ok) return null;
    const data = await res.json();
    return data.activo ? data : null;
  } catch(e) {
    console.error('Azure lookup:', e);
    return null;
  }
}
const msalConfig = {
  auth: {
    clientId: "9f85ee63-a011-4636-857e-b72128ed61e9",
    authority: "https://login.microsoftonline.com/3fce0139-013b-4c64-a04d-8605a9eb8088",
    redirectUri: window.location.origin + window.location.pathname
  },
  cache: { cacheLocation: "sessionStorage" }
};

let msalInstance;
try { msalInstance = new msal.PublicClientApplication(msalConfig); } catch(e) { console.warn("MSAL:", e); }

function mostrarAlerta(msg) {
  const el = document.getElementById("alerta");
  el.textContent = msg;
  el.classList.add("show");
  setTimeout(() => el.classList.remove("show"), 3000);
}

function loginMS() {
  const obra = document.getElementById("obraSelect").value;
  if (!obra) { mostrarAlerta("Por favor selecciona una obra antes de continuar."); return; }
  if (!msalInstance) { mostrarAlerta("MSAL no disponible. Verifica la conexión."); return; }
  sessionStorage.setItem("obraActiva", obra);
  msalInstance.loginRedirect({ scopes: ["User.Read", "Sites.Read.All"] });
}

function loginDemo() {
  const obra = document.getElementById("obraSelect").value || "demo";
  sessionStorage.setItem("obraActiva", obra);
  sessionStorage.setItem("modoDemo", "true");
  sessionStorage.setItem("usuarioNombre", "Supervisor Demo");
  sessionStorage.setItem("userRole", "supervisor");
  window.location.href = "supervisor.html";
}

window.addEventListener("load", async () => {
 if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/cao-metarco/sw.js');
  }
  cargarObras();
  if (!msalInstance) return;
  try {
    const resp = await msalInstance.handleRedirectPromise();
    if (resp && resp.account) {
      sessionStorage.setItem("usuarioNombre", resp.account.name || resp.account.username);
      sessionStorage.setItem("usuarioEmail", resp.account.username);
const email = (resp.account.username || "").toLowerCase();
      const usuario = await consultarUsuario(email);
      if (!usuario) {
        sessionStorage.clear();
        mostrarAlerta("Acceso no autorizado. Contacta al administrador.");
        return;
      }
sessionStorage.setItem("userRole", usuario.rol);
      sessionStorage.setItem("userObras", usuario.obras || "todas");
      if (usuario.rol === 'admin') document.getElementById('btnDemo').style.display = 'block';
      const obraActiva = sessionStorage.getItem("obraActiva");
      const obras = (usuario.obras || "todas").toLowerCase();
      if (obras !== "todas" && obraActiva) {
        const lista = obras.split(",").map(o => o.trim().toLowerCase());
        if (!lista.includes(obraActiva.toLowerCase())) {
          mostrarAlerta("No tienes acceso a esa obra. Tus obras asignadas: " + usuario.obras);
          sessionStorage.removeItem("obraActiva");
          return;
        }
      }
      window.location.href = "supervisor.html";
    }
  } catch(e) { console.error(e); }
});
</script>
</body>
</html>
